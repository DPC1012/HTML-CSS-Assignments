
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Align</title>
    <style>
        .container {
            width: 1200px;
            height: 500px;
            background-color: yellow;
        }
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
        }
    </style>
</head>

<body style="height:  98vh; display: flex; justify-content: center; align-items: center;">
    <div class="container">
            <div class="content" style="background-color: red;">
                    <h1>Hello World</h1>
            </div>
    </div>
</body>

</html>

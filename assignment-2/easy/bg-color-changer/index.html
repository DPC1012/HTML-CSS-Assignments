<html>
    <head>
        <title> bg-color-changer </title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body id="body">
        <div id="main" class="main">
            <button class="color-btn" data-color="violet" style="background-color: violet;" >violet</button>
            <button class="color-btn" data-color="indigo" style="background-color: indigo;" >indigo</button>
            <button class="color-btn" data-color="blue" style="background-color: blue;" >blue</button>
            <button class="color-btn" data-color="green" style="background-color: green;" >green</button>
            <button class="color-btn" data-color="yellow" style="background-color: yellow;" >yellow</button>
            <button class="color-btn" data-color="orange" style="background-color: orange;" >orange</button>
            <button class="color-btn" data-color="red" style="background-color: red;" >red</button>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
